<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Pro</title>
</head>

<body>

<div class="calc-container">
    <input type="text" id="calc-display" disabled>

    <div class="calc-buttonss">

    
        <button onclick="clearDisplay()">AC</button>
        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">←</button>
        <button onclick="appendOperator('/')">÷</button>

       
        <button onclick="appendParenthesis('(')">(</button>
        <button onclick="appendParenthesis(')')">)</button>
        <button onclick="appendOperator('*')">x</button>
        <button onclick="appendOperator('-')">-</button>

     
        <button onclick="appedNumber('7')">7</button>
        <button onclick="appedNumber('8')">8</button>
        <button onclick="appedNumber('9')">9</button>
        <button onclick="appendOperator('+')">+</button>

     
        <button onclick="appedNumber('4')">4</button>
        <button onclick="appedNumber('5')">5</button>
        <button onclick="appedNumber('6')">6</button>
        <button onclick="appendOperator('*')">*</button>

        <button onclick="appedNumber('1')">1</button>
        <button onclick="appedNumber('2')">2</button>
        <button onclick="appedNumber('3')">3</button>
        <button onclick="appendOperator('/')">/</button>

      
        <button onclick="appedNumber('0')">0</button>
        <button onclick="appedNumber('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="calculate()">Evaluar</button>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
